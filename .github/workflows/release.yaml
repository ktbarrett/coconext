name: Release

on:
  workflow_dispatch:
  push:
    tags:
    - '*'

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-26, macos-15-intel]

    steps:
    - uses: actions/checkout@v7

    - uses: pypa/cibuildwheel@v3

    - uses: actions/upload-artifact@v7
      with:
        name: wheels-${{ matrix.os }}
        path: wheelhouse/*.whl

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v7

    - uses: actions/setup-python@v6.2.0
      with:
        python-version: "3.13"

    - uses: astral-sh/setup-uv@v8.1.0

    - name: Build sdist
      run: uv build --sdist --out-dir dist

    - uses: actions/upload-artifact@v7
      with:
        name: sdist
        path: dist/*.tar.gz

  test-release-wheels:
    name: Regression (Wheels)
    needs: [build-wheels]
    uses: ./.github/workflows/regression-tests.yaml
    with:
      make_targets: release_test
      download_wheel_artifacts: true

  test-release-sdist:
    name: Regression (Sdist)
    needs: [build-sdist]
    uses: ./.github/workflows/regression-tests.yaml
    with:
      make_targets: release_test
      download_sdist_artifacts: true

  publish:
    name: Publish to PyPI
    needs: [test-release-wheels, test-release-sdist]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    permissions:
      id-token: write

    steps:
    - uses: actions/download-artifact@v8
      with:
        pattern: wheels-*
        path: dist
        merge-multiple: true

    - uses: actions/download-artifact@v8
      with:
        name: sdist
        path: dist

    - uses: pypa/gh-action-pypi-publish@release/v1
