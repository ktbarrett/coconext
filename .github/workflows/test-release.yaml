name: Release

on:
  workflow_dispatch:
  push:
    branches:
    #- dev
    tags:
    - '*'

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-26, macos-15-intel]

    steps:
    - uses: actions/checkout@v6.0.2

    - uses: pypa/cibuildwheel@v3

    - uses: actions/upload-artifact@v7
      with:
        name: wheels-${{ matrix.os }}
        path: wheelhouse/*.whl

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v6.0.2

    - uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - uses: astral-sh/setup-uv@v8.1.0

    - name: Build sdist
      run: uv build --sdist --out-dir dist

    - uses: actions/upload-artifact@v7
      with:
        name: sdist
        path: dist/*.tar.gz

  test_release:
    name: Regression Tests
    needs: [build-wheels, build-sdist]
    uses: ./.github/workflows/regression-tests.yaml
    with:
      test_task: release_test
      download_artifacts: true

  publish:
    name: Publish to PyPI
    needs: [test_release]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    permissions:
      id-token: write

    steps:
    - uses: actions/download-artifact@v8
      with:
        pattern: wheels-*
        path: dist
        merge-multiple: true

    - uses: actions/download-artifact@v8
      with:
        name: sdist
        path: dist

    - uses: pypa/gh-action-pypi-publish@release/v1
